<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Do you Love Me?</title>
  <style>
    body {
      background-color: black;
    }

    p {
      text-align: center;
      font-size: 32px;
      font-family: Candara, Oswald;
      color: white;
    }

    img {
      display: block;
      margin: 0 auto;
      width: 25%;
    }

    #botao1 {
      position: fixed;
      top: 80%;
      left: 55%;
      transform: translate(-50%, -50%);
      padding: 7px;
      background-color: rgb(0, 255, 106);
      font-family: Candara, Oswald;
      border: 0;
    }

    #botao2 {
      position: absolute;
      left: 40%;
      top: 78%;
      color: white;
      padding: 7px;
      font-family: Candara, Oswald;
      background-color: rgb(255, 0, 0);
      border: 0;
    }
  </style>
</head>

<body>
  <p>Will you be my GF?</p>
  <img src="https://media.tenor.com/zGm5acSjHCIAAAAM/cat-begging.gif">
  <button id="botao1">YES BABY!</button>
  <button id="botao2">NO</button>
  <script>
    const button2 = document.getElementById('botao2');
    let left = 40;
    button2.addEventListener('mouseover', function () {
      if (left == 40) {
        left = 44;
      } else {
        left = 40;
      }
      this.style.left = left + '%';
    });

  </script>
  <script>document.getElementById('botao1').addEventListener('click', function () {
      alert('THANK U LOVE U');
    });

  </script>
</body>

</html>
